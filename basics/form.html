<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First form</title>
</head>
<body>
    <form>
        <label for="Company">Company:- </label>
        <input type="text" id="Company">

        <br>
        <label for="fname">First Name:-</label>
        <input type="text" id="fname">

        <br>
        <label for="lname">Last Name:-</label>
        <input type="text" id="lname">

        <br>
        <label for="email">Email Address:-</label>
        <input type="email" id="email">

        <br>
        <label for="title">Title :-</label>
        <input type="text" id="title">

        <br>
        <label for="phone">Phone:-</label>
        <input type="number" id="phone">

        <br>
        <label for="cancel">Cancel Registration</label>
        <input type="checkbox" id="cancel">

        <br>
        <label for="date">Select Training Date:-</label>
        <input type="date" id="date">

        <br><br>

        <label for="job">Job Function:- </label>
        <br>

        <input type="radio" id="cm">
        <label for="cm">Campaign Management </label>

        <br>
        <input type="radio" id="crmadmin">
        <label for="crmadmin">CRM Administration </label>
        
        <br>
        <input type="radio" id="emaild">
        <label for="emaild">Email Deployment </label>

        <br>
        <input type="radio" id="partner">
        <label for="partner">Partner </label>

        <br>
        <input type="radio" id="employee">
        <label for="employee">Employee </label>

        <br>

        <label for="dr">Dietary Requirement:-</label>
        <input type="text" id="dr">

        <br>

        <label for="expectation">Expectations:-</label>
        <textarea id="expectation"></textarea>

        <br>

        <input type="submit" value="submit">
        
    </form>
</body>
</html>
